name: UI checks

on:
  push:
    branches:
      - main
    paths:
      - 'ui/**/package.json'
      - 'ui/**/yarn.lock'

  pull_request:
    paths:
      - 'ui/**/package.json'
      - 'ui/**/yarn.lock'

jobs:
  ui_job:
    runs-on: ubuntu-latest
    name: UI dependency check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com
      - name: Clean yarn.lock private dependencies
        run: |
          echo "Checking for private yarn.lock dependencies"
          if grep -E "nexus\.vanti\.co\.uk/repository/npm-public/" ui/yarn.lock; then
            echo "Private URLs found in yarn.lock" >&2
            exit 1
          else
            echo "No private URLs found."
          fi
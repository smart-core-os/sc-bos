openapi: 3.0.3
info:
  title: Cloudsim Management API
  description: REST API for managing cloudsim entities (Sites, Nodes, ConfigVersions, Deployments)
  version: 1.0.0

servers:
  - url: /api/v1/management
  - url: /v1/device

paths:
  /register:
    post:
      summary: Enroll device
      operationId: deviceRegister
      tags: [DeviceAPI]
      description: >-
        Exchanges a PKCS#10 CSR for a signed certificate chain, authorised by a
        single-use enrollment code sent as a Bearer token. The code is
        invalidated on success. Inspired by EST simpleenroll (RFC 7030), not an EST implementation.
      security:
        - enrollmentCode: []
      requestBody:
        required: true
        content:
          application/pkcs10:
            schema:
              type: string
              format: byte
              description: >-
                DER-encoded PKCS#10 CSR, base64-encoded
      responses:
        '201':
          description: Certificate issued; PEM chain, leaf first then the CA.
          content:
            application/pem-certificate-chain:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /certificate/renew:
    post:
      summary: Renew device certificate
      operationId: deviceRenew
      tags: [DeviceAPI]
      description: >-
        Issues a fresh certificate to an already-enrolled controller, authorised
        by its current certificate (mutual TLS) — no enrollment code. The
        credentialId is preserved. Same media types as registration. Inspired by
        EST simplereenroll (RFC 7030), not an EST implementation.
      requestBody:
        required: true
        content:
          application/pkcs10:
            schema:
              type: string
              format: byte
              description: >-
                DER-encoded PKCS#10 CSR, base64-encoded
      responses:
        '200':
          description: Certificate renewed; PEM chain, leaf first then the CA.
          content:
            application/pem-certificate-chain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /check-in:
    post:
      summary: Node check-in
      operationId: checkIn
      tags: [DeviceAPI]
      description: >-
        Records a check-in for the controller (authenticated by its X.509 client
        certificate, mutual TLS) and returns the newest active deployment, if any.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
      responses:
        '200':
          description: Check-in recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sites:
    get:
      summary: List sites
      operationId: listSites
      tags: [Sites]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: List of sites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create site
      operationId: createSite
      tags: [Sites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          $ref: '#/components/responses/BadRequest'

  /sites/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get site
      operationId: getSite
      tags: [Sites]
      responses:
        '200':
          description: Site details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update site
      operationId: updateSite
      tags: [Sites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSiteRequest'
      responses:
        '200':
          description: Site updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete site
      operationId: deleteSite
      tags: [Sites]
      responses:
        '204':
          description: Site deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes:
    get:
      summary: List nodes
      operationId: listNodes
      tags: [Nodes]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: siteId
          in: query
          description: Filter by site ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create node
      operationId: createNode
      tags: [Nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
      responses:
        '201':
          description: Node created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'

  /nodes/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get node
      operationId: getNode
      tags: [Nodes]
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update node
      operationId: updateNode
      tags: [Nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeRequest'
      responses:
        '200':
          description: Node updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete node
      operationId: deleteNode
      tags: [Nodes]
      responses:
        '204':
          description: Node deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{id}/enrollment-codes:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      summary: Create enrollment code
      operationId: createEnrollmentCode
      tags: [Nodes]
      description: >-
        Generates a new single-use enrollment code for the given node.
        The code expires after 15 minutes and is invalidated once used.
      responses:
        '201':
          description: Enrollment code created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentCode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/check-ins:
    parameters:
      - $ref: '#/components/parameters/nodeId'
    get:
      summary: List node check-ins
      operationId: listNodeCheckIns
      tags: [NodeCheckIns]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: List of check-ins for the node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeCheckInList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /nodes/{nodeId}/check-ins/{id}:
    parameters:
      - $ref: '#/components/parameters/nodeId'
      - $ref: '#/components/parameters/id'
    get:
      summary: Get node check-in
      operationId: getNodeCheckIn
      tags: [NodeCheckIns]
      responses:
        '200':
          description: Check-in details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeCheckIn'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /config-versions:
    get:
      summary: List config versions
      operationId: listConfigVersions
      tags: [ConfigVersions]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: nodeId
          in: query
          description: Filter by node ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of config versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigVersionList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create config version
      operationId: createConfigVersion
      tags: [ConfigVersions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigVersionRequest'
      responses:
        '201':
          description: Config version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigVersion'
        '400':
          $ref: '#/components/responses/BadRequest'

  /config-versions/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get config version
      operationId: getConfigVersion
      tags: [ConfigVersions]
      responses:
        '200':
          description: Config version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigVersion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete config version
      operationId: deleteConfigVersion
      tags: [ConfigVersions]
      responses:
        '204':
          description: Config version deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /config-versions/{id}/payload:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Download config version payload
      operationId: getConfigVersionPayload
      tags: [ConfigVersions]
      responses:
        '200':
          description: Config payload binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /config-deployments:
    get:
      summary: List deployments
      operationId: listConfigDeployments
      tags: [ConfigDeployments]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: nodeId
          in: query
          description: Filter by node ID (via config version)
          schema:
            type: integer
            format: int64
        - name: configVersionId
          in: query
          description: Filter by config version ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDeploymentList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create deployment
      operationId: createConfigDeployment
      tags: [ConfigDeployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigDeploymentRequest'
      responses:
        '201':
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /config-deployments/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get deployment
      operationId: getConfigDeployment
      tags: [ConfigDeployments]
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update deployment status
      operationId: updateConfigDeploymentStatus
      tags: [ConfigDeployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigDeploymentStatusRequest'
      responses:
        '200':
          description: Deployment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete deployment
      operationId: deleteConfigDeployment
      tags: [ConfigDeployments]
      responses:
        '204':
          description: Deployment deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /binary-artefacts:
    get:
      summary: List binary artefacts
      operationId: listBinaryArtefacts
      tags: [BinaryArtefacts]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: os
          in: query
          description: Filter by GOOS
          schema:
            type: string
            enum: [linux, freebsd]
        - name: arch
          in: query
          description: Filter by GOARCH
          schema:
            type: string
            enum: [amd64, arm64]
        - name: siteId
          in: query
          description: Filter by site ID (also returns generic artefacts with no site)
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of binary artefacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryArtefactList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Upload binary artefact
      operationId: createBinaryArtefact
      tags: [BinaryArtefacts]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [version, os, arch, payload]
              properties:
                version:
                  type: string
                  description: Artefact version string
                os:
                  type: string
                  enum: [linux, freebsd]
                  description: Target GOOS
                arch:
                  type: string
                  enum: [amd64, arm64]
                  description: Target GOARCH
                siteId:
                  type: integer
                  format: int64
                  description: Site ID; omit for a generic artefact available to all sites
                description:
                  type: string
                  description: Optional human-readable description
                payload:
                  type: string
                  format: binary
                  description: Payload tarball (e.g. podman save output)
      responses:
        '201':
          description: Artefact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryArtefact'
        '400':
          $ref: '#/components/responses/BadRequest'

  /binary-artefacts/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get binary artefact
      operationId: getBinaryArtefact
      tags: [BinaryArtefacts]
      responses:
        '200':
          description: Artefact details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryArtefact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete binary artefact
      operationId: deleteBinaryArtefact
      tags: [BinaryArtefacts]
      responses:
        '204':
          description: Artefact deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /binary-artefacts/{id}/payload:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Download binary artefact payload
      operationId: getBinaryArtefactPayload
      tags: [BinaryArtefacts]
      description: >-
        Downloads the raw payload tarball. This endpoint requires no authentication
        and is suitable for direct linking.
      responses:
        '200':
          description: Artefact payload binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /binary-deployments:
    get:
      summary: List binary deployments
      operationId: listBinaryDeployments
      tags: [BinaryDeployments]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: nodeId
          in: query
          description: Filter by node ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of binary deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryDeploymentList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create binary deployment
      operationId: createBinaryDeployment
      tags: [BinaryDeployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBinaryDeploymentRequest'
      responses:
        '201':
          description: Binary deployment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /binary-deployments/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get binary deployment
      operationId: getBinaryDeployment
      tags: [BinaryDeployments]
      responses:
        '200':
          description: Binary deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update deployment status
      operationId: updateBinaryDeploymentStatus
      tags: [BinaryDeployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBinaryDeploymentStatusRequest'
      responses:
        '200':
          description: Deployment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BinaryDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete binary deployment
      operationId: deleteBinaryDeployment
      tags: [BinaryDeployments]
      responses:
        '204':
          description: Binary deployment deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    nodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    pageToken:
      name: pageToken
      in: query
      description: Page token for pagination (opaque string)
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: Number of items per page (default 50, max 1000)
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: invalid_request
        message:
          type: string
          example: invalid request

    Site:
      type: object
      required: [id, name, createTime]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        createTime:
          type: string
          format: date-time

    SiteList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Site'
        nextPageToken:
          type: string

    CreateSiteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateSiteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Node:
      type: object
      required: [id, hostname, siteId, createTime]
      properties:
        id:
          type: integer
          format: int64
        hostname:
          type: string
        siteId:
          type: integer
          format: int64
        os:
          type: string
          description: GOOS the node reports; empty until first reported on check-in
        arch:
          type: string
          description: GOARCH the node reports; empty until first reported on check-in
        createTime:
          type: string
          format: date-time

    NodeList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        nextPageToken:
          type: string

    CreateNodeRequest:
      type: object
      required: [hostname, siteId]
      properties:
        hostname:
          type: string
        siteId:
          type: integer
          format: int64
        os:
          type: string
          enum: [linux, freebsd]
          description: Optional GOOS; may be omitted and reconciled from check-in
        arch:
          type: string
          enum: [amd64, arm64]
          description: Optional GOARCH; may be omitted and reconciled from check-in

    UpdateNodeRequest:
      type: object
      required: [hostname, siteId]
      properties:
        hostname:
          type: string
        siteId:
          type: integer
          format: int64
        os:
          type: string
          enum: [linux, freebsd]
          description: Optional GOOS; may be omitted and reconciled from check-in
        arch:
          type: string
          enum: [amd64, arm64]
          description: Optional GOARCH; may be omitted and reconciled from check-in

    NodeCheckIn:
      type: object
      required: [id, nodeId, checkInTime]
      properties:
        id:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        checkInTime:
          type: string
          format: date-time
        currentDeploymentId:
          type: integer
          format: int64
          nullable: true
        installingDeploymentId:
          type: integer
          format: int64
          nullable: true
        installingDeploymentError:
          type: string
          nullable: true
        installingDeploymentAttempts:
          type: integer
          nullable: true

    NodeCheckInList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NodeCheckIn'
        nextPageToken:
          type: string

    ConfigVersion:
      type: object
      required: [id, nodeId, payloadUrl, createTime]
      properties:
        id:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        version:
          type: string
          description: Human-readable version string; optional
        description:
          type: string
        payloadUrl:
          type: string
          format: uri
          description: Fully qualified URL to download the raw config payload
          example: https://api.example.com/api/v1/management/config-versions/1/payload
        checksum:
          type: string
          description: Type-prefixed "<algo>:<base64>" digest of the payload; optional
        createTime:
          type: string
          format: date-time

    ConfigVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConfigVersion'
        nextPageToken:
          type: string

    CreateConfigVersionRequest:
      type: object
      required: [nodeId, payload]
      properties:
        nodeId:
          type: integer
          format: int64
        version:
          type: string
          description: Human-readable version string; optional
        description:
          type: string
        payload:
          type: string
          format: byte
          description: Base64-encoded binary payload

    ConfigDeployment:
      type: object
      required: [id, configVersionId, status, startTime]
      properties:
        id:
          type: integer
          format: int64
        configVersionId:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        startTime:
          type: string
          format: date-time
        finishedTime:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
          description: Optional reason for failure or cancellation

    ConfigDeploymentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConfigDeployment'
        nextPageToken:
          type: string

    CreateConfigDeploymentRequest:
      type: object
      required: [configVersionId]
      properties:
        configVersionId:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending]
          default: pending
          description: Deployment status. Must be pending if provided. Defaults to pending if omitted.

    UpdateConfigDeploymentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        reason:
          type: string
          description: Optional reason, typically used for FAILED or CANCELLED status

    EnrollmentCode:
      type: object
      required: [id, nodeId, code, expiresAt]
      properties:
        id:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        code:
          type: string
          description: Single-use enrollment code
        expiresAt:
          type: string
          format: date-time

    CheckInRequest:
      description: >-
        What the node is running (running) plus progress on its in-flight deployments (progress). A
        bare "{}" is a "just checking in" request.
      type: object
      properties:
        running:
          $ref: '#/components/schemas/RunningState'
        progress:
          type: array
          items:
            $ref: '#/components/schemas/ProgressReport'

    RunningState:
      type: object
      properties:
        config:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RunningArtefact'
        binary:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RunningArtefact'
        platform:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Platform'
          description: The node's GOOS/GOARCH; reconciled onto the node

    RunningArtefact:
      type: object
      properties:
        version:
          type: string
        versionId:
          type: string
        hash:
          type: string
          description: Type-prefixed "<algo>:<base64>" digest of the running artefact

    Platform:
      type: object
      required: [os, arch]
      properties:
        os:
          type: string
        arch:
          type: string

    ProgressReport:
      description: Progress on one in-flight deployment, keyed by its type-prefixed deployment id.
      type: object
      required: [deploymentId, state]
      properties:
        deploymentId:
          type: string
        state:
          type: string
          enum: [installing, applied, failed]
        attempts:
          type: integer
        error:
          type: string
          description: Transient error, reported with state=installing
        reason:
          type: string
          description: Terminal reason, reported with state=failed

    CheckInResponse:
      type: object
      required: [checkIn]
      properties:
        checkIn:
          $ref: '#/components/schemas/CheckInAck'
        latestConfig:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/LatestStream'
        latestBinary:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/LatestStream'

    CheckInAck:
      type: object
      required: [nodeId, checkInTime]
      properties:
        nodeId:
          type: string
        checkInTime:
          type: string
          format: date-time

    LatestStream:
      description: >-
        The deployment a stream (config or binary) wants the node to reach, plus the version it
        targets. Returned in latestConfig/latestBinary; the shape is identical for both.
      type: object
      required: [deployment, version]
      properties:
        deployment:
          $ref: '#/components/schemas/StreamDeployment'
        version:
          $ref: '#/components/schemas/VersionProjection'

    StreamDeployment:
      type: object
      required: [id, artefact, versionId, status]
      properties:
        id:
          type: string
          description: Opaque deployment id, echoed back verbatim when reporting progress on it
        artefact:
          type: string
          enum: [config, binary]
        versionId:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]

    VersionProjection:
      description: The artefact version a deployment targets - where to download it and how to verify it.
      type: object
      required: [id, version, payloadUrl, createTime]
      properties:
        id:
          type: string
        version:
          type: string
        description:
          type: string
        payloadUrl:
          type: string
          format: uri
          description: URL to download the raw payload
        checksum:
          type: string
          description: Type-prefixed "<algo>:<base64>" digest of the payload; absent when unknown
        createTime:
          type: string
          format: date-time

    BinaryArtefact:
      type: object
      required: [id, os, arch, version, createTime]
      properties:
        id:
          type: integer
          format: int64
        siteId:
          type: integer
          format: int64
          nullable: true
        os:
          type: string
          enum: [linux, freebsd]
        arch:
          type: string
          enum: [amd64, arm64]
        version:
          type: string
        checksum:
          type: string
          nullable: true
          description: Type-prefixed "<algo>:<base64>" digest of the payload; optional
        description:
          type: string
          nullable: true
        size:
          type: integer
          format: int64
          nullable: true
          description: Payload size in bytes
        payloadUrl:
          type: string
          format: uri
          description: URL to download the raw payload tarball
          example: https://api.example.com/api/v1/management/binary-artefacts/1/payload
        createTime:
          type: string
          format: date-time

    BinaryArtefactList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BinaryArtefact'
        nextPageToken:
          type: string

    BinaryDeployment:
      type: object
      required: [id, binaryArtefactId, nodeId, status, startTime]
      properties:
        id:
          type: integer
          format: int64
        binaryArtefactId:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        startTime:
          type: string
          format: date-time
        finishedTime:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
          description: Optional reason for failure or cancellation

    BinaryDeploymentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BinaryDeployment'
        nextPageToken:
          type: string

    CreateBinaryDeploymentRequest:
      type: object
      required: [binaryArtefactId, nodeId]
      properties:
        binaryArtefactId:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending]
          default: pending
          description: Deployment status. Must be pending if provided. Defaults to pending if omitted.

    UpdateBinaryDeploymentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        reason:
          type: string
          description: Optional reason, typically used for failed or cancelled status

  securitySchemes:
    enrollmentCode:
      type: http
      scheme: bearer
      description: >-
        Single-use enrollment code sent as a Bearer token. Authorises device
        registration only; check-in and renewal authenticate via mutual TLS
        (the controller's X.509 client certificate), which OpenAPI 3.0 cannot
        express as a security scheme — see those operations' descriptions.

tags:
  - name: DeviceAPI
    description: BOS-facing device API (registration, renewal, check-in)
  - name: Sites
    description: Physical location management
  - name: Nodes
    description: BOS controller management
  - name: NodeCheckIns
    description: Node check-in tracking
  - name: ConfigVersions
    description: Versioned configuration management
  - name: ConfigDeployments
    description: Configuration deployment tracking
  - name: BinaryArtefacts
    description: BOS binary artefact management
  - name: BinaryDeployments
    description: BOS binary deployment tracking

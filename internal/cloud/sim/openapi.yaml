openapi: 3.0.3
info:
  title: Cloudsim Management API
  description: REST API for managing cloudsim entities (Sites, Nodes, ConfigVersions, Deployments)
  version: 1.0.0

servers:
  - url: /api/v1/management
  - url: /v1/device

paths:
  /token:
    post:
      summary: OAuth2 token endpoint
      operationId: token
      tags: [DeviceAPI]
      description: >-
        Implements the OAuth2 Client Credentials Grant (RFC 6749 §4.4).
        Exchanges client_id and client_secret for a short-lived JWT access token.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id, client_secret]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /register:
    post:
      summary: Register device
      operationId: deviceRegister
      tags: [DeviceAPI]
      description: >-
        Exchanges a valid enrollment code (provided as a Bearer token) for
        client credentials. The enrollment code is single-use and invalidated
        on success. The returned client_secret cannot be retrieved later.
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '201':
          description: Device registered; client credentials issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /check-in:
    post:
      summary: Node check-in
      operationId: checkIn
      tags: [DeviceAPI]
      description: >-
        Records a check-in for the authenticated node and returns the
        newest active deployment (if any).
      security:
        - bearerToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
      responses:
        '200':
          description: Check-in recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sites:
    get:
      summary: List sites
      operationId: listSites
      tags: [Sites]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: List of sites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create site
      operationId: createSite
      tags: [Sites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          $ref: '#/components/responses/BadRequest'

  /sites/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get site
      operationId: getSite
      tags: [Sites]
      responses:
        '200':
          description: Site details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update site
      operationId: updateSite
      tags: [Sites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSiteRequest'
      responses:
        '200':
          description: Site updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete site
      operationId: deleteSite
      tags: [Sites]
      responses:
        '204':
          description: Site deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes:
    get:
      summary: List nodes
      operationId: listNodes
      tags: [Nodes]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: siteId
          in: query
          description: Filter by site ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create node
      operationId: createNode
      tags: [Nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
      responses:
        '201':
          description: Node created. The response includes the initial Node secret.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /nodes/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get node
      operationId: getNode
      tags: [Nodes]
      responses:
        '200':
          description: Node details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update node
      operationId: updateNode
      tags: [Nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeRequest'
      responses:
        '200':
          description: Node updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete node
      operationId: deleteNode
      tags: [Nodes]
      responses:
        '204':
          description: Node deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{id}/enrollment-codes:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      summary: Create enrollment code
      operationId: createEnrollmentCode
      tags: [Nodes]
      description: >-
        Generates a new single-use enrollment code for the given node.
        The code expires after 15 minutes and is invalidated once used.
      responses:
        '201':
          description: Enrollment code created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentCode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{id}/rotate-secret:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      summary: Rotate node secret
      operationId: rotateNodeSecret
      tags: [Nodes]
      description: >-
        Generates a new secret for the node. The previous secret is invalidated.
        The new secret cannot be retrieved later.
      responses:
        '200':
          description: The updated Node, including the new secret.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /nodes/{nodeId}/check-ins:
    parameters:
      - $ref: '#/components/parameters/nodeId'
    get:
      summary: List node check-ins
      operationId: listNodeCheckIns
      tags: [NodeCheckIns]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: List of check-ins for the node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeCheckInList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /nodes/{nodeId}/check-ins/{id}:
    parameters:
      - $ref: '#/components/parameters/nodeId'
      - $ref: '#/components/parameters/id'
    get:
      summary: Get node check-in
      operationId: getNodeCheckIn
      tags: [NodeCheckIns]
      responses:
        '200':
          description: Check-in details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeCheckIn'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /config-versions:
    get:
      summary: List config versions
      operationId: listConfigVersions
      tags: [ConfigVersions]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: nodeId
          in: query
          description: Filter by node ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of config versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigVersionList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create config version
      operationId: createConfigVersion
      tags: [ConfigVersions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigVersionRequest'
      responses:
        '201':
          description: Config version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigVersion'
        '400':
          $ref: '#/components/responses/BadRequest'

  /config-versions/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get config version
      operationId: getConfigVersion
      tags: [ConfigVersions]
      responses:
        '200':
          description: Config version details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigVersion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete config version
      operationId: deleteConfigVersion
      tags: [ConfigVersions]
      responses:
        '204':
          description: Config version deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /config-versions/{id}/payload:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Download config version payload
      operationId: getConfigVersionPayload
      tags: [ConfigVersions]
      responses:
        '200':
          description: Config payload binary data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /deployments:
    get:
      summary: List deployments
      operationId: listDeployments
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - name: nodeId
          in: query
          description: Filter by node ID (via config version)
          schema:
            type: integer
            format: int64
        - name: configVersionId
          in: query
          description: Filter by config version ID
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      summary: Create deployment
      operationId: createDeployment
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /deployments/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get deployment
      operationId: getDeployment
      tags: [Deployments]
      responses:
        '200':
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update deployment status
      operationId: updateDeploymentStatus
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentStatusRequest'
      responses:
        '200':
          description: Deployment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete deployment
      operationId: deleteDeployment
      tags: [Deployments]
      responses:
        '204':
          description: Deployment deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    nodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    pageToken:
      name: pageToken
      in: query
      description: Page token for pagination (opaque string)
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: Number of items per page (default 50, max 1000)
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Invalid or missing authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: invalid_request
        message:
          type: string
          example: invalid request

    Site:
      type: object
      required: [id, name, createTime]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        createTime:
          type: string
          format: date-time

    SiteList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Site'
        nextPageToken:
          type: string

    CreateSiteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateSiteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Node:
      type: object
      required: [id, hostname, siteId, createTime]
      properties:
        id:
          type: integer
          format: int64
        hostname:
          type: string
        siteId:
          type: integer
          format: int64
        createTime:
          type: string
          format: date-time

    NodeList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        nextPageToken:
          type: string

    CreateNodeRequest:
      type: object
      required: [hostname, siteId]
      properties:
        hostname:
          type: string
        siteId:
          type: integer
          format: int64

    UpdateNodeRequest:
      type: object
      required: [hostname, siteId]
      properties:
        hostname:
          type: string
        siteId:
          type: integer
          format: int64

    CreateNodeResponse:
      description: >-
        Response from creating a node or rotating its secret.
        Contains the node fields plus an authentication secret.
      allOf:
        - $ref: '#/components/schemas/Node'
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              format: byte
              description: >-
                Secret (32 bytes, base64-encoded). Secrets are only returned
                from the API call that generates them. The client must store
                the secret as it cannot be retrieved later.

    NodeCheckIn:
      type: object
      required: [id, nodeId, checkInTime]
      properties:
        id:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        checkInTime:
          type: string
          format: date-time
        currentDeploymentId:
          type: integer
          format: int64
          nullable: true
        installingDeploymentId:
          type: integer
          format: int64
          nullable: true
        installingDeploymentError:
          type: string
          nullable: true
        installingDeploymentAttempts:
          type: integer
          nullable: true

    NodeCheckInList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NodeCheckIn'
        nextPageToken:
          type: string

    ConfigVersion:
      type: object
      required: [id, nodeId, payloadUrl, createTime]
      properties:
        id:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        description:
          type: string
        payloadUrl:
          type: string
          format: uri
          description: Fully qualified URL to download the raw config payload
          example: https://api.example.com/api/v1/management/config-versions/1/payload
        createTime:
          type: string
          format: date-time

    ConfigVersionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConfigVersion'
        nextPageToken:
          type: string

    CreateConfigVersionRequest:
      type: object
      required: [nodeId, payload]
      properties:
        nodeId:
          type: integer
          format: int64
        description:
          type: string
        payload:
          type: string
          format: byte
          description: Base64-encoded binary payload

    Deployment:
      type: object
      required: [id, configVersionId, status, startTime]
      properties:
        id:
          type: integer
          format: int64
        configVersionId:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        startTime:
          type: string
          format: date-time
        finishedTime:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          nullable: true
          description: Optional reason for failure or cancellation

    DeploymentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Deployment'
        nextPageToken:
          type: string

    CreateDeploymentRequest:
      type: object
      required: [configVersionId]
      properties:
        configVersionId:
          type: integer
          format: int64
        status:
          type: string
          enum: [pending]
          default: pending
          description: Deployment status. Must be pending if provided. Defaults to pending if omitted.

    UpdateDeploymentStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        reason:
          type: string
          description: Optional reason, typically used for FAILED or CANCELLED status

    EnrollmentCode:
      type: object
      required: [id, nodeId, code, expiresAt]
      properties:
        id:
          type: integer
          format: int64
        nodeId:
          type: integer
          format: int64
        code:
          type: string
          description: Single-use enrollment code
        expiresAt:
          type: string
          format: date-time

    DeviceRegisterRequest:
      type: object
      properties:
        client_name:
          type: string

    DeviceRegisterResponse:
      type: object
      required: [client_id, client_secret, client_name, bosapi_root]
      properties:
        client_id:
          type: string
          description: Numeric node ID as a decimal string
        client_secret:
          type: string
          format: byte
          description: >-
            32-byte secret (base64-encoded). Must be stored by the client;
            it cannot be retrieved later.
        client_name:
          type: string
        bosapi_root:
          type: string
          format: uri
          description: Base URL of the BOS API for this node

    CheckInRequest:
      type: object
      properties:
        currentDeployment:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CheckInDeploymentRef'
          description: The deployment currently running on this node
        installingDeployment:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CheckInInstallingDeployment'
          description: The deployment currently being installed on this node
        failedDeployment:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/CheckInFailedDeployment'
          description: A deployment that just failed; triggers status update to FAILED

    CheckInDeploymentRef:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64

    CheckInInstallingDeployment:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
        error:
          type: string
          description: Optional error message if installation encountered a non-fatal issue
        attempts:
          type: integer
          description: Number of installation attempts for this deployment

    CheckInFailedDeployment:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
        reason:
          type: string
          description: Reason the deployment failed

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Token lifetime in seconds

    CheckInResponse:
      type: object
      required: [checkIn]
      properties:
        checkIn:
          $ref: '#/components/schemas/CheckInAck'
        latestConfig:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/LatestConfig'

    CheckInAck:
      type: object
      required: [nodeId, checkInTime]
      properties:
        nodeId:
          type: string
        checkInTime:
          type: string
          format: date-time

    LatestConfig:
      description: The newest active deployment and its associated config version, returned as part of a check-in response.
      type: object
      required: [deployment, configVersion]
      properties:
        deployment:
          $ref: '#/components/schemas/Deployment'
        configVersion:
          $ref: '#/components/schemas/ConfigVersion'

  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from the token endpoint

tags:
  - name: DeviceAPI
    description: BOS-facing device API (token, check-in)
  - name: Sites
    description: Physical location management
  - name: Nodes
    description: BOS controller management
  - name: NodeCheckIns
    description: Node check-in tracking
  - name: ConfigVersions
    description: Versioned configuration management
  - name: Deployments
    description: Configuration deployment tracking

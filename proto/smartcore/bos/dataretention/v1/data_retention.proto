syntax = "proto3";

package smartcore.bos.dataretention.v1;

option go_package = "github.com/smart-core-os/sc-bos/pkg/proto/dataretentionpb";

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

// DataRetentionApi provides access to data retention utilisation stats and administrative actions.
service DataRetentionApi {
  rpc GetDataRetention(GetDataRetentionRequest) returns (DataRetention);
  rpc PullDataRetention(PullDataRetentionRequest) returns (stream PullDataRetentionResponse);

  // Remove stored data. If before is set, only records older than that time are removed;
  // if absent, all records are removed.
  rpc PurgeDataRetention(PurgeDataRetentionRequest) returns (PurgeDataRetentionResponse);
  // Compact/optimise storage (GC, VACUUM, repack).
  rpc CompactDataRetention(CompactDataRetentionRequest) returns (CompactDataRetentionResponse);
}

// DataRetentionInfo provides metadata about what a device supports for the data retention trait.
service DataRetentionInfo {
  rpc DescribeDataRetention(DescribeDataRetentionRequest) returns (DataRetentionSupport);
}

// DataRetention represents the current state of a data retention resource.
message DataRetention {
  // Byte-based measurement (disk space, file size, DB tablespace, etc.)
  DataRetentionBytes bytes = 1;
  // Item-based measurement (rows, records, files, log entries, etc.)
  DataRetentionItems items = 2;
}

// DataRetentionBytes describes storage consumption measured in bytes.
//
// The fields partition the storage backing this store:
//   capacity = used + other_used + available + reserved
// where reserved is space that exists but this store cannot use (e.g. filesystem
// blocks reserved for root). When the relevant fields are present, clients can derive:
//   space free to this store = available
//   store fullness           = used / (used + available)                          // 0 when empty, 100 when this store can grow no further
//   disk fullness (df Use%)  = (used + other_used) / (used + other_used + available)
message DataRetentionBytes {
  // Bytes currently in use by this data store.
  optional uint64 used = 1;
  // Total capacity in bytes of the volume backing this store: the effective limit it
  // can grow into. For a filesystem-backed store this is the size of the containing
  // filesystem, which reflects a volume/quota limit when that limit is enforced at the
  // filesystem level. Omit if unlimited or unknown.
  optional uint64 capacity = 2;
  // Bytes used by other data sharing the same volume (i.e. not this data store).
  optional uint64 other_used = 3;
  // Bytes this store can still write before reaching capacity. Excludes space that
  // exists but is unusable by this store (e.g. filesystem blocks reserved for root),
  // so it may be less than capacity - used - other_used. Omit if unknown.
  optional uint64 available = 4;
}

// DataRetentionItems describes storage consumption measured in discrete items
// (rows, records, files, log entries, etc.).
message DataRetentionItems {
  // Number of items currently stored.
  optional uint64 used = 1;
  // Maximum item count. Omit if unlimited or unknown.
  optional uint64 capacity = 2;
}

// DataRetentionSupport describes the capabilities of a device implementing the data retention trait.
message DataRetentionSupport {
  bool can_purge   = 1;
  // Field 2 reserved (was can_delete_old, merged into can_purge).
  bool can_compact = 3;
  // Field 4 reserved (was can_spring_clean, removed — clients call Purge then Compact).
  // Singular name for the item unit when items is populated (e.g. "row", "record", "file").
  string item_name = 5;
}

message GetDataRetentionRequest {
  string name = 1;
  google.protobuf.FieldMask read_mask = 2;
}

message PullDataRetentionRequest {
  string name = 1;
  google.protobuf.FieldMask read_mask = 2;
  bool updates_only = 3;
}

message PullDataRetentionResponse {
  repeated Change changes = 1;

  message Change {
    string name = 1;
    google.protobuf.Timestamp change_time = 2;
    DataRetention data_retention = 3;
  }
}

message PurgeDataRetentionRequest {
  string name = 1;
  // If set, only records recorded before this time are removed. If absent, all records are removed.
  optional google.protobuf.Timestamp before = 2;
}

message PurgeDataRetentionResponse {
  optional uint64 freed_item_count = 1;
  optional uint64 freed_byte_count = 2;
  string message = 3;
}

message CompactDataRetentionRequest {
  string name = 1;
}

message CompactDataRetentionResponse {
  optional uint64 freed_byte_count = 1;
  string message = 2;
}

message DescribeDataRetentionRequest {
  string name = 1;
}

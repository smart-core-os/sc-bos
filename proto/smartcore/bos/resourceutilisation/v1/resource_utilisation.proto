syntax = "proto3";

package smartcore.bos.resourceutilisation.v1;

option go_package = "github.com/smart-core-os/sc-bos/pkg/proto/resourceutilisationpb";

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

// ResourceUtilisationApi provides access to host-level resource utilisation stats.
service ResourceUtilisationApi {
  rpc GetResourceUtilisation(GetResourceUtilisationRequest) returns (ResourceUtilisation);
  rpc PullResourceUtilisation(PullResourceUtilisationRequest) returns (stream PullResourceUtilisationResponse);
}

message ResourceUtilisation {
  CpuUtilisation cpu = 1;
  MemoryUtilisation memory = 2;
  repeated DiskUtilisation disks = 3;
  NetworkUtilisation network = 4;
}

message CpuUtilisation {
  // Overall CPU utilisation as a percentage (0-100).
  optional float percent_utilised = 1;
  // Per-core CPU utilisation percentages (0-100 each).
  repeated float core_percent = 2;
}

message MemoryUtilisation {
  optional uint64 used_bytes = 1;
  optional uint64 total_bytes = 2;
  optional float percent_used = 3;
}

message DiskUtilisation {
  string mount_point = 1;
  optional uint64 used_bytes = 2;
  optional uint64 free_bytes = 3;
  optional uint64 total_bytes = 4;
  optional float percent_used = 5;
}

message NetworkUtilisation {
  optional uint64 connections_established = 1;
}

message GetResourceUtilisationRequest {
  string name = 1;
  google.protobuf.FieldMask read_mask = 2;
}

message PullResourceUtilisationRequest {
  string name = 1;
  google.protobuf.FieldMask read_mask = 2;
  bool updates_only = 3;
}

message PullResourceUtilisationResponse {
  repeated Change changes = 1;

  message Change {
    string name = 1;
    google.protobuf.Timestamp change_time = 2;
    ResourceUtilisation resource_utilisation = 3;
  }
}

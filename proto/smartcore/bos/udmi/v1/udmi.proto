syntax = "proto3";

package smartcore.bos.udmi.v1;

option go_package = "github.com/smart-core-os/sc-bos/pkg/proto/udmipb";

import "google/protobuf/timestamp.proto";

// UdmiService defines the service needed to add UDMI support to a driver or system.
// The implementer is responsible for message payloads and topic definitions. This will not be validated.
service UdmiService {
  // PullControlTopics returns a stream of topics the implementer is interested in subscribing to.
  // Each response will include all topics, any sent previously can be discarded.
  // (usually config topics, https://faucetsdn.github.io/udmi/docs/messages/config.html)
  rpc PullControlTopics(PullControlTopicsRequest) returns (stream PullControlTopicsResponse);
  // If the implementer lists topics in any PullControlTopicsResponse, then each message received via the MQTT
  // broker will invoke a call to this method
  rpc OnMessage(OnMessageRequest) returns (OnMessageResponse);
  // PullExportMessages, which are to be published to the MQTT broker for data export
  rpc PullExportMessages(PullExportMessagesRequest) returns (stream PullExportMessagesResponse);
  // GetExportMessage returns a single MqttMessage.
  // Servers may return the last message returned by PullExportMessages, or collect data explicitly to return.
  // If the server does not have a message to return, it may return an Unavailable error.
  rpc GetExportMessage(GetExportMessageRequest) returns (MqttMessage);
}

message PullControlTopicsRequest {
  string name = 1;
}

message PullControlTopicsResponse {
  string name = 1;
  repeated string topics = 2;
}

message OnMessageRequest {
  string name = 1;
  MqttMessage message = 2;
}

message OnMessageResponse {
  string name = 1;
}

message PullExportMessagesRequest {
  string name = 1;
  // When true the last sent message will be sent immediately as the first message in the response stream.
  bool include_last = 2;
}

message PullExportMessagesResponse {
  string name = 1;
  MqttMessage message = 2;
}

message GetExportMessageRequest {
  string name = 1;
}

message MqttMessage {
  string topic = 1;
  string payload = 2;  // JSON payload
}

// UdmiExportApi exposes the distinct messages the UDMI automation has published to
// the MQTT broker, so a caller can build a full points list export.
//
// Unlike UdmiService (which drivers implement to produce payloads), UdmiExportApi is
// implemented by the udmi automation itself: it observes every payload flowing through
// the automation's publish path, regardless of the source driver, and is announced
// against the automation's configured name.
service UdmiExportApi {
  // ListExportedPoints returns the most recent payload published for each distinct
  // MQTT topic since the automation last (re)started, keyed by source and topic.
  rpc ListExportedPoints(ListExportedPointsRequest) returns (ListExportedPointsResponse);
}

message ListExportedPointsRequest {
  // name identifies the udmi automation to query.
  string name = 1;
}

message ListExportedPointsResponse {
  repeated ExportedMessage messages = 1;
}

// ExportedMessage is the most recent payload published for a single MQTT topic,
// together with the Smart Core source that produced it and basic bookkeeping.
message ExportedMessage {
  // source_name is the Smart Core name of the UdmiService source that produced the message.
  string source_name = 1;
  // topic is the MQTT topic the message was published to.
  string topic = 2;
  // message_type classifies the topic: "event", "state", "metadata" or "other".
  string message_type = 3;
  // payload is the most recent JSON payload published for this topic.
  string payload = 4;
  // first_seen is when a message for this topic was first published since the automation (re)started.
  google.protobuf.Timestamp first_seen = 5;
  // last_seen is when the most recent message for this topic was published.
  google.protobuf.Timestamp last_seen = 6;
  // count is the number of messages published for this topic since the automation (re)started.
  int64 count = 7;
}
